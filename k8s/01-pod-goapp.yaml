apiVersion: v1
kind: Pod
metadata:
  name: goapp-pod
  labels:
    app: goapp
    lab: lab2
spec:
  imagePullSecrets:
    - name: ghcr-secret
  containers:
    - name: app
      image: ghcr.io/j9djtl/containers-lab-1/app:latest
      ports:
        - containerPort: 8080
      resources:
        requests:
          memory: "64Mi"
          cpu: "250m"
        limits:
          memory: "128Mi"
          cpu: "500m"
